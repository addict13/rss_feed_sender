name: Daily RSS Digest

on:
  schedule:
    # 매일 오전 8시 (KST) = UTC 23:00 (전날)
    - cron: "0 23 * * *"

  # 수동 실행도 가능하게
  workflow_dispatch:
    inputs:
      dry_run:
        description: "이메일 발송 없이 테스트만 (true/false)"
        required: false
        default: "false"

jobs:
  digest:
    name: Fetch · Analyze · Email
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: RSS 분석 & 이메일 발송
        env:
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL:          ${{ secrets.TO_EMAIL }}
          FROM_NAME:         "RSS Digest Bot"
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
        run: python rss_analyzer.py

      - name: 생성된 HTML 다이제스트 업로드 (아티팩트)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-html-${{ github.run_number }}
          path: digest_preview.html
          retention-days: 7
